	<body>
		<header>
			<nav class="horizontal">
				<ul>
					<li><a href="index.html">Home</a></li>
					<li><a href="recommendations.html">Recommendations</a></li>
					<li><a href="favoriteAuthors.html">Favorite Authors</a></li>

				</ul>
			</nav>
		</header>
		
		<div id="polling-container">
		<h2>What's Your Favorite Book?</h2>
        
		<div id="polling-form">
			<form id="bookForm">
				<div class="book-option">
					<input type="radio" id="book1" name="favoriteBook" value="Project Hail Mary">
					<label for="book1">Project Hail Mary by Andy Weir</label>
				</div>
				
				<div class="book-option">
					<input type="radio" id="book2" name="favoriteBook" value="Babel">
					<label for="book2">Babel by R.F. Kuang</label>
				</div>

				<div class="book-option">
					<input type="radio" id="book3" name="favoriteBook" value="Attack on Titan">
					<label for="book3">Attack on Titan by Hajime Isayama</label>
				</div>
				
				<div class="book-option">
					<input type="radio" id="book4" name="favoriteBook" value="A Stepmother's Marchen">
					<label for="book4">A Stepmother's Marchen by Spice and Kitty</label>
				</div>
				
				<button type="submit">Submit Your Choice</button>
			</form>
		</div>
        

		<div id="results" style="display:none; margin-top:20px;">
			<h3>Vote Results</h3>
			<canvas id="chart"></canvas>
		</div>

		</div>
	</body>
</html>
